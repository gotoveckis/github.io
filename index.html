<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1ONE Service CRM</title>
  <meta name="theme-color" content="#f97316">
  <style>
    :root{
      --bg:#f5f7fb;
      --surface:#ffffff;
      --surface-2:#f8fafc;
      --text:#172033;
      --muted:#64748b;
      --line:#d9e1ec;
      --accent:#f97316;
      --accent-2:#2563eb;
      --accent-soft:#fff1e8;
      --danger:#dc2626;
      --success:#16a34a;
      --warn:#d97706;
      --shadow:0 16px 42px rgba(15,23,42,.08);
      --radius:12px;
      --sidebar:250px;
      --header:68px;
    }
    [data-theme="dark"]{
      --bg:#0f172a;
      --surface:#141e31;
      --surface-2:#111827;
      --text:#f8fafc;
      --muted:#b5c0d0;
      --line:#334155;
      --accent-soft:rgba(249,115,22,.16);
      --shadow:0 18px 42px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.45;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .hidden{display:none !important}
    .auth-page{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:linear-gradient(135deg,#fff7ed,#eff6ff 52%,#f8fafc);
    }
    [data-theme="dark"] .auth-page{background:#0f172a}
    .auth-card{
      width:min(420px,100%);
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:28px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:900;
      letter-spacing:0;
      font-size:24px;
    }
    .brand-mark{
      width:34px;
      height:34px;
      display:grid;
      place-items:center;
      border-radius:10px;
      background:var(--accent);
      color:#fff;
      font-weight:1000;
      box-shadow:0 8px 18px rgba(249,115,22,.28);
    }
    .auth-card h1{
      margin:24px 0 6px;
      font-size:26px;
      line-height:1.15;
    }
    .auth-card p{margin:0 0 22px;color:var(--muted)}
    .field{display:grid;gap:7px;margin-bottom:14px}
    .field span{font-size:13px;font-weight:800;color:var(--muted)}
    input,select,textarea{
      width:100%;
      border:1px solid var(--line);
      background:var(--surface);
      color:var(--text);
      border-radius:10px;
      padding:11px 12px;
      outline:none;
      transition:border-color .18s,box-shadow .18s;
    }
    textarea{min-height:88px;resize:vertical}
    input:focus,select:focus,textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(249,115,22,.14);
    }
    .error{
      min-height:20px;
      color:var(--danger);
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }
    .remember{
      display:flex;
      align-items:center;
      gap:9px;
      color:var(--muted);
      font-size:14px;
      margin:4px 0 16px;
    }
    .remember input{width:auto}
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:42px;
      border:1px solid transparent;
      border-radius:10px;
      padding:0 14px;
      font-weight:850;
      color:var(--text);
      background:var(--surface-2);
      white-space:nowrap;
    }
    .btn:hover{filter:brightness(.98)}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-secondary{border-color:var(--line);background:var(--surface)}
    .btn-danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}
    [data-theme="dark"] .btn-danger{background:rgba(220,38,38,.18);color:#fecaca;border-color:rgba(248,113,113,.35)}
    .btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
    .btn-small{min-height:34px;padding:0 10px;font-size:13px;border-radius:9px}
    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:var(--sidebar) minmax(0,1fr);
    }
    .sidebar{
      position:sticky;
      top:0;
      height:100vh;
      border-right:1px solid var(--line);
      background:var(--surface);
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:18px;
      z-index:10;
    }
    .sync-chip{
      display:flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      background:var(--surface-2);
    }
    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--warn);
      box-shadow:0 0 0 4px rgba(217,119,6,.12);
    }
    .dot.online{background:var(--success);box-shadow:0 0 0 4px rgba(22,163,74,.14)}
    .dot.offline{background:var(--danger);box-shadow:0 0 0 4px rgba(220,38,38,.14)}
    .nav{display:grid;gap:8px}
    .nav button{
      width:100%;
      justify-content:flex-start;
      min-height:44px;
      color:var(--muted);
    }
    .nav button.active{
      background:var(--accent-soft);
      color:var(--accent);
      border-color:rgba(249,115,22,.25);
    }
    .sidebar-footer{margin-top:auto;display:grid;gap:8px}
    .current-user{
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      background:var(--surface-2);
    }
    .current-user b{display:block;font-size:14px}
    .current-user span{display:block;color:var(--muted);font-size:12px;margin-top:2px}
    .main{
      min-width:0;
      display:grid;
      grid-template-rows:var(--header) minmax(0,1fr);
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:8;
      height:var(--header);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:0 22px;
      border-bottom:1px solid var(--line);
      background:color-mix(in srgb,var(--surface) 92%,transparent);
      backdrop-filter:blur(14px);
    }
    .topbar h2{
      margin:0;
      font-size:20px;
      line-height:1.1;
    }
    .topbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .content{padding:22px;min-width:0}
    .stats{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
      margin-bottom:16px;
    }
    .stat{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
    }
    .stat span{color:var(--muted);font-size:13px;font-weight:800}
    .stat b{display:block;font-size:24px;margin-top:6px}
    .panel{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:16px;
    }
    .panel-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .panel-head h3{margin:0;font-size:18px}
    .filters{
      display:grid;
      grid-template-columns:minmax(180px,1.5fr) repeat(4,minmax(130px,1fr));
      gap:10px;
    }
    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}
    table{width:100%;border-collapse:collapse;min-width:960px;background:var(--surface)}
    th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
    th{
      position:sticky;
      top:0;
      z-index:1;
      background:var(--surface-2);
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.02em;
    }
    tr:last-child td{border-bottom:none}
    .empty{
      padding:30px;
      text-align:center;
      color:var(--muted);
      border:1px dashed var(--line);
      border-radius:12px;
      background:var(--surface-2);
    }
    .status{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:26px;
      padding:0 9px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      background:var(--surface-2);
      border:1px solid var(--line);
      color:var(--muted);
    }
    .status.new{background:#dbeafe;color:#1d4ed8;border-color:#bfdbfe}
    .status.diagnostics{background:#fef3c7;color:#92400e;border-color:#fde68a}
    .status.in_progress{background:#ffedd5;color:#c2410c;border-color:#fed7aa}
    .status.waiting{background:#f3e8ff;color:#7e22ce;border-color:#e9d5ff}
    .status.ready{background:#dcfce7;color:#15803d;border-color:#bbf7d0}
    .status.issued{background:#e2e8f0;color:#334155;border-color:#cbd5e1}
    .row-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .money{font-weight:900}
    .muted{color:var(--muted)}
    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:50;
      display:none;
      align-items:flex-start;
      justify-content:center;
      overflow:auto;
      padding:24px;
      background:rgba(15,23,42,.54);
    }
    .modal-backdrop.open{display:flex}
    .modal{
      width:min(920px,100%);
      background:var(--surface);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:0 30px 80px rgba(0,0,0,.32);
      padding:18px;
      margin:auto 0;
    }
    .modal-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .modal-head h3{margin:0;font-size:20px}
    .modal-actions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:16px;
      flex-wrap:wrap;
    }
    .cards-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
    }
    .item-card{
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
      background:var(--surface);
    }
    .item-card h4{margin:0 0 8px;font-size:16px}
    .item-card p{margin:4px 0;color:var(--muted);font-size:14px}
    .toast{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:100;
      display:none;
      min-width:260px;
      max-width:380px;
      padding:12px 14px;
      border-radius:12px;
      background:var(--surface);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      font-weight:800;
    }
    .toast.show{display:block}
    .role-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .role-pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:5px 9px;
      font-size:12px;
      color:var(--muted);
      background:var(--surface-2);
    }
    .role-pill input{width:auto}
    @media (max-width:1100px){
      .app{grid-template-columns:1fr}
      .sidebar{
        position:static;
        height:auto;
        border-right:none;
        border-bottom:1px solid var(--line);
      }
      .nav{grid-template-columns:repeat(3,minmax(0,1fr))}
      .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
      .filters{grid-template-columns:1fr 1fr}
      .cards-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:720px){
      .topbar{height:auto;min-height:var(--header);align-items:flex-start;flex-direction:column;padding:14px}
      .content{padding:14px}
      .nav{grid-template-columns:1fr 1fr}
      .stats,.grid-2,.grid-3,.filters,.cards-grid{grid-template-columns:1fr}
      .modal-backdrop{padding:10px}
      .row-actions .btn{width:100%}
    }
    @media print{
      body{background:#fff;color:#111}
      .auth-page,.sidebar,.topbar,.panel,.modal-backdrop,.toast{display:none !important}
      .print-doc{display:block !important}
    }
    .print-doc{display:none}
  </style>
</head>
<body>
  <section class="auth-page" id="authPage">
    <div class="auth-card">
      <div class="brand"><span class="brand-mark">1</span><span>ONE Service CRM</span></div>
      <h1>Вход в систему</h1>
      <p>Данные хранятся в Firebase и обновляются на всех устройствах в реальном времени.</p>
      <form id="loginForm">
        <label class="field">
          <span>Логин</span>
          <input id="loginInput" autocomplete="username" required>
        </label>
        <label class="field">
          <span>Пароль</span>
          <input id="passwordInput" type="password" autocomplete="current-password" required>
        </label>
        <div class="error" id="loginError"></div>
        <label class="remember">
          <input id="rememberInput" type="checkbox">
          <span>Запомнить вход</span>
        </label>
        <button class="btn btn-primary" type="submit" style="width:100%">Войти</button>
      </form>
    </div>
  </section>

  <section class="app hidden" id="appPage">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">1</span><span>ONE Service</span></div>
      <div class="sync-chip"><span class="dot" id="syncDot"></span><span id="syncText">Подключение...</span></div>
      <nav class="nav" id="nav">
        <button class="btn active" data-view="orders">Заказы</button>
        <button class="btn" data-view="inventory">Склад</button>
        <button class="btn" data-view="finance">Финансы</button>
        <button class="btn admin-only" data-view="masters">Мастера</button>
        <button class="btn admin-only" data-view="settings">Настройки</button>
      </nav>
      <div class="sidebar-footer">
        <div class="current-user">
          <b id="currentUserName">Пользователь</b>
          <span id="currentUserRole">Участник</span>
        </div>
        <button class="btn btn-secondary" id="themeToggleBtn" type="button">Темная тема</button>
        <button class="btn btn-secondary" id="logoutBtn" type="button">Выйти</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="viewTitle">Заказы</h2>
          <div class="muted" id="viewSubtitle">Рабочий список заказов</div>
        </div>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>
      <div class="content">
        <section id="ordersView"></section>
        <section id="inventoryView" class="hidden"></section>
        <section id="financeView" class="hidden"></section>
        <section id="mastersView" class="hidden"></section>
        <section id="settingsView" class="hidden"></section>
      </div>
    </main>
  </section>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal"></div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="print-doc" id="printDoc"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      updateDoc,
      deleteDoc,
      onSnapshot,
      getDoc,
      serverTimestamp,
      query,
      orderBy
    } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyDrAWXv0oPhpvAPvqnLj8PMaFJHCLJggzM',
      authDomain: 'one-service-crm.firebaseapp.com',
      projectId: 'one-service-crm',
      storageBucket: 'one-service-crm.firebasestorage.app',
      messagingSenderId: '945997466278',
      appId: '1:945997466278:web:ea2e731b635cc5c7c00267'
    };

    const ADMIN = { id:'admin', name:'Администратор', login:'gotoveckis', password:'18101997', roles:['admin'], isAdmin:true };
    const WORKSPACE_ID = 'one-service';
    const SESSION_KEY = 'one_service_clean_crm_session';
    const REMEMBER_KEY = 'one_service_clean_crm_remember';
    const THEME_KEY = 'one_service_clean_crm_theme';
    const CURRENCIES = {
      UAH:{ name:'Гривна', code:'UAH', symbol:'грн' },
      RUB:{ name:'Рубли', code:'RUB', symbol:'₽' },
      USD:{ name:'Доллар', code:'USD', symbol:'$' },
      EUR:{ name:'Евро', code:'EUR', symbol:'€' },
      GEL:{ name:'Лари', code:'GEL', symbol:'₾' }
    };
    const STATUSES = {
      new:'Новый',
      diagnostics:'Диагностика',
      in_progress:'В работе',
      waiting:'Ожидает',
      ready:'Готов',
      issued:'Выдан'
    };
    const STATUS_CLASS = {
      new:'new',
      diagnostics:'diagnostics',
      in_progress:'in_progress',
      waiting:'waiting',
      ready:'ready',
      issued:'issued'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const root = (...parts) => ['workspaces', WORKSPACE_ID, ...parts];
    const refs = {
      settings: () => doc(db, ...root('settings', 'main')),
      orders: () => collection(db, ...root('orders')),
      order: id => doc(db, ...root('orders', id)),
      masters: () => collection(db, ...root('masters')),
      master: id => doc(db, ...root('masters', id)),
      inventory: () => collection(db, ...root('inventory')),
      inventoryItem: id => doc(db, ...root('inventory', id)),
      finance: () => collection(db, ...root('finance')),
      financeItem: id => doc(db, ...root('finance', id))
    };

    const state = {
      firebaseReady:false,
      dataReady:false,
      view:'orders',
      user:null,
      settings:{
        serviceName:'1ONE Service',
        phone:'+380509906265',
        address:'Харьков, ул. Харьковских Дивизий, 14/2',
        currency:'UAH',
        orderPrefix:'',
        nextOrderNumber:1000,
        theme:'light'
      },
      orders:[],
      masters:[],
      inventory:[],
      finance:[],
      filters:{ search:'', status:'', master:'', payment:'' }
    };

    const $ = id => document.getElementById(id);
    const authPage = $('authPage');
    const appPage = $('appPage');
    const views = {
      orders:$('ordersView'),
      inventory:$('inventoryView'),
      finance:$('financeView'),
      masters:$('mastersView'),
      settings:$('settingsView')
    };

    const safe = value => String(value ?? '').replace(/[&<>"']/g, char => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[char]));
    const uid = prefix => `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    const today = () => new Date().toISOString().slice(0,10);
    const nowIso = () => new Date().toISOString();
    const amount = value => {
      const number = Number(String(value ?? '').replace(',', '.'));
      return Number.isFinite(number) ? number : 0;
    };
    const currency = () => CURRENCIES[state.settings.currency] || CURRENCIES.UAH;
    const money = value => {
      const num = amount(value);
      try {
        return new Intl.NumberFormat('ru-RU', {
          style:'currency',
          currency:currency().code,
          maximumFractionDigits:2
        }).format(num);
      } catch {
        return `${num.toLocaleString('ru-RU')} ${currency().symbol}`;
      }
    };
    const formatDate = value => {
      if (!value) return '—';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString('ru-RU');
    };
    const isAdmin = () => Boolean(state.user?.isAdmin || state.user?.roles?.includes('admin'));
    const isLogged = () => Boolean(state.user);
    const masterOptions = selected => state.masters
      .filter(item => item.active !== false)
      .sort((a,b) => a.name.localeCompare(b.name,'ru'))
      .map(item => `<option value="${safe(item.name)}" ${selected === item.name ? 'selected' : ''}>${safe(item.name)}</option>`)
      .join('');
    const statusOptions = selected => Object.entries(STATUSES)
      .map(([key,label]) => `<option value="${key}" ${selected === key ? 'selected' : ''}>${label}</option>`)
      .join('');

    function toast(message){
      const node = $('toast');
      node.textContent = message;
      node.classList.add('show');
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => node.classList.remove('show'), 2600);
    }
    function setSync(status, text){
      $('syncDot').className = `dot ${status}`;
      $('syncText').textContent = text;
    }
    function setTheme(theme){
      const next = theme === 'dark' ? 'dark' : 'light';
      document.body.dataset.theme = next;
      localStorage.setItem(THEME_KEY, next);
      $('themeToggleBtn').textContent = next === 'dark' ? 'Светлая тема' : 'Темная тема';
    }
    function showApp(){
      authPage.classList.add('hidden');
      appPage.classList.remove('hidden');
      $('currentUserName').textContent = state.user?.name || 'Пользователь';
      $('currentUserRole').textContent = isAdmin() ? 'Администратор' : 'Участник';
      document.querySelectorAll('.admin-only').forEach(node => node.classList.toggle('hidden', !isAdmin()));
      if (!isAdmin() && ['masters','settings'].includes(state.view)) state.view = 'orders';
      render();
    }
    function showAuth(){
      state.user = null;
      authPage.classList.remove('hidden');
      appPage.classList.add('hidden');
      localStorage.removeItem(SESSION_KEY);
      $('passwordInput').value = '';
    }
    function saveSession(remember){
      if (!state.user) return;
      if (remember) {
        localStorage.setItem(REMEMBER_KEY, '1');
        localStorage.setItem(SESSION_KEY, JSON.stringify({ id:state.user.id, isAdmin:isAdmin() }));
      } else {
        localStorage.removeItem(REMEMBER_KEY);
        localStorage.removeItem(SESSION_KEY);
      }
    }
    function restoreSession(){
      if (localStorage.getItem(REMEMBER_KEY) !== '1') return;
      const stored = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
      if (!stored) return;
      if (stored.isAdmin || stored.id === 'admin') {
        state.user = { ...ADMIN, password:'' };
        showApp();
        return;
      }
      const master = state.masters.find(item => item.id === stored.id && item.active !== false);
      if (master) {
        state.user = { ...master, password:'' };
        showApp();
      } else {
        showAuth();
      }
    }
    function validateAccess(){
      if (!state.user || isAdmin()) return;
      const master = state.masters.find(item => item.id === state.user.id && item.active !== false);
      if (!master) {
        toast('Доступ удален администратором.');
        showAuth();
        return;
      }
      state.user = { ...master, password:'' };
      $('currentUserName').textContent = state.user.name;
    }

    async function bootstrap(){
      const settingsSnap = await getDoc(refs.settings());
      if (!settingsSnap.exists()) {
        await setDoc(refs.settings(), { ...state.settings, updatedAt:serverTimestamp(), updatedAtIso:nowIso() }, { merge:true });
      }
      setSync('online','Firebase подключен');
    }
    function bindRealtime(){
      onSnapshot(refs.settings(), snap => {
        if (snap.exists()) state.settings = { ...state.settings, ...snap.data() };
        setTheme(localStorage.getItem(THEME_KEY) || state.settings.theme || 'light');
        render();
      }, () => setSync('offline','Ошибка настроек'));

      onSnapshot(query(refs.orders(), orderBy('updatedAtIso','desc')), snap => {
        state.orders = snap.docs.map(item => ({ ...item.data(), id:item.id }));
        state.dataReady = true;
        setSync('online','Realtime включен');
        render();
      }, () => setSync('offline','Ошибка заказов'));

      onSnapshot(query(refs.masters(), orderBy('name','asc')), snap => {
        state.masters = snap.docs.map(item => ({ ...item.data(), id:item.id }));
        validateAccess();
        restoreSession();
        render();
      }, () => setSync('offline','Ошибка мастеров'));

      onSnapshot(query(refs.inventory(), orderBy('name','asc')), snap => {
        state.inventory = snap.docs.map(item => ({ ...item.data(), id:item.id }));
        render();
      }, () => setSync('offline','Ошибка склада'));

      onSnapshot(query(refs.finance(), orderBy('date','desc')), snap => {
        state.finance = snap.docs.map(item => ({ ...item.data(), id:item.id }));
        render();
      }, () => setSync('offline','Ошибка финансов'));
    }
    async function startFirebase(){
      setSync('', 'Подключение...');
      try {
        await signInAnonymously(auth);
      } catch {
        setSync('offline','Anonymous Auth выключен');
        return;
      }
      onAuthStateChanged(auth, async user => {
        if (!user || state.firebaseReady) return;
        state.firebaseReady = true;
        await bootstrap();
        bindRealtime();
      });
    }

    function nextOrderNumber(){
      const nums = state.orders
        .map(item => Number(String(item.number || '').replace(/\D/g,'')))
        .filter(Number.isFinite);
      return Math.max(Number(state.settings.nextOrderNumber || 1000), ...nums, 999) + 1;
    }
    async function saveOrder(data){
      if (!isLogged()) return toast('Нужно войти в систему.');
      const id = data.id || uid('order');
      const old = state.orders.find(item => item.id === id);
      const statusHistory = Array.isArray(old?.statusHistory) ? [...old.statusHistory] : [];
      if (!old) statusHistory.push({ status:data.status, at:nowIso(), user:state.user.name });
      if (old && old.status !== data.status) statusHistory.push({ status:data.status, at:nowIso(), user:state.user.name });
      await setDoc(refs.order(id), {
        ...data,
        id,
        number:data.number || `${state.settings.orderPrefix || ''}${nextOrderNumber()}`,
        statusHistory,
        createdAtIso:old?.createdAtIso || nowIso(),
        updatedAtIso:nowIso(),
        updatedAt:serverTimestamp(),
        updatedBy:state.user.name
      }, { merge:true });
      toast('Заказ сохранен.');
    }

      if (!isAdmin()) return toast('Удалять заказы может только администратор.');
      await deleteDoc(refs.order(id));

    async function saveMaster(data){

      const id = data.id || uid('master');

    function filteredOrders(){
      const search = state.filters.search.trim().toLowerCase();
      return state.orders.filter(order => {
        const text = [order.number, order.client, order.phone, order.device, order.model, order.problem, order.master].join(' ').toLowerCase();
        if (search && !text.includes(search)) return false;
        if (state.filters.status && order.status !== state.filters.status) return false;
        if (state.filters.master && order.master !== state.filters.master) return false;
        if (state.filters.payment === 'debt' && amount(order.total) <= amount(order.paid)) return false;
        if (state.filters.payment === 'paid' && amount(order.total) > amount(order.paid)) return false;
        return true;
      });
    }
    function orderStats(){
      const active = state.orders.filter(item => item.status !== 'issued');
      const debt = state.orders.reduce((sum,item) => sum + Math.max(0, amount(item.total) - amount(item.paid)), 0);
      const revenue = state.orders.reduce((sum,item) => sum + amount(item.paid), 0);
      const ready = state.orders.filter(item => item.status === 'ready').length;
      return { active:active.length, debt, revenue, ready };
    }

      const stats = orderStats();

          <div class="stat"><span>Долги</span><b>${money(stats.debt)}</b></div>

          <label class="field"><span>Дата</span><input name="date" type="date" value="${safe(item.date || today())}"></label>
          <label class="field"><span>Категория</span><input name="category" value="${safe(item.category || '')}"></label>
          <label class="field"><span>Сумма</span><input name="amount" type="number" step="0.01" value="${safe(item.amount || '')}" required></label>
          <label class="field" style="grid-column:1/-1"><span>Описание</span><textarea name="note">${safe(item.note || '')}</textarea></label>
          <div class="modal-actions" style="grid-column:1/-1"><button class="btn btn-primary" type="submit">Сохранить</button></div>
        </form>
      `);
    }
    function masterModal(master = {}){
      openModal(`
        <div class="modal-head"><h3>${master.id ? 'Мастер' : 'Новый мастер'}</h3><button class="btn btn-ghost" data-close-modal>Закрыть</button></div>
        <form id="masterForm" class="grid-2">
          <input type="hidden" name="id" value="${safe(master.id || '')}">
          <label class="field"><span>Имя</span><input name="name" value="${safe(master.name || '')}" required></label>
          <label class="field"><span>Логин</span><input name="login" value="${safe(master.login || '')}" required autocomplete="off"></label>
          <label class="field"><span>Пароль</span><input name="password" value="${safe(master.password || '')}" required autocomplete="new-password"></label>
          <label class="field"><span>Зарплата, %</span><input name="salaryPercent" type="number" step="0.01" value="${safe(master.salaryPercent || '20')}"></label>
          <div style="grid-column:1/-1">
            <span class="muted">Доступ</span>
            <div class="role-list">
              ${['orders','inventory','finance','print'].map(role => `<label class="role-pill"><input type="checkbox" name="roles" value="${role}" ${(master.roles || ['orders','inventory','finance','print']).includes(role) ? 'checked' : ''}> ${role}</label>`).join('')}
            </div>
          </div>
          <div class="modal-actions" style="grid-column:1/-1"><button class="btn btn-primary" type="submit">Сохранить</button></div>
        </form>
      `);
    }
    function printOrder(order){
      const html = `
        <html lang="ru"><head><meta charset="UTF-8"><title>Заказ ${safe(order.number)}</title>
        <style>
          body{font-family:Arial,sans-serif;color:#111;margin:0;padding:24px}
          .doc{max-width:760px;margin:0 auto}
          .head{display:flex;justify-content:space-between;gap:16px;border-bottom:2px solid #f97316;padding-bottom:14px;margin-bottom:18px}
          h1{font-size:26px;margin:0 0 8px}.muted{color:#555}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
          .box{border:1px solid #ddd;border-radius:8px;padding:10px;margin-bottom:10px}
          table{width:100%;border-collapse:collapse;margin-top:12px}td{border:1px solid #ddd;padding:8px}
          .sign{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:40px}.line{border-top:1px solid #111;padding-top:6px}
        </style></head><body><div class="doc">
          <div class="head"><div><h1>${safe(state.settings.serviceName)}</h1><div class="muted">${safe(state.settings.phone)}<br>${safe(state.settings.address)}</div></div><div><b>Заказ № ${safe(order.number)}</b><br>${formatDate(order.createdAtIso)}</div></div>
          <div class="grid">
            <div class="box"><b>Клиент</b><br>${safe(order.client)}<br>${safe(order.phone)}</div>
            <div class="box"><b>Устройство</b><br>${safe(order.device)} ${safe(order.model)}</div>
          </div>
          <div class="box"><b>Неисправность</b><br>${safe(order.problem || '—')}</div>
          <div class="box"><b>Работы / заметки</b><br>${safe(order.notes || '—')}</div>
          <table><tr><td>Статус</td><td>${safe(STATUSES[order.status] || order.status)}</td></tr><tr><td>Мастер</td><td>${safe(order.master || '—')}</td></tr><tr><td>Сумма</td><td>${money(order.total)}</td></tr><tr><td>Оплачено</td><td>${money(order.paid)}</td></tr><tr><td>Долг</td><td>${money(Math.max(0, amount(order.total) - amount(order.paid)))}</td></tr></table>
          <div class="sign"><div class="line">Подпись клиента</div><div class="line">Подпись мастера</div></div>
        </div><script>window.addEventListener('load',()=>setTimeout(()=>{window.print()},150))<\/script></body></html>
      `;
      const win = window.open('', '_blank', 'width=900,height=900');
      if (!win) return toast('Браузер заблокировал печать.');
      win.document.write(html);
      win.document.close();
    }

    document.addEventListener('click', async event => {
      const close = event.target.closest('[data-close-modal]');
      if (close || event.target === $('modalBackdrop')) closeModal();
      const nav = event.target.closest('[data-view]');
      if (nav) {
        if (nav.classList.contains('admin-only') && !isAdmin()) return toast('Раздел доступен только администратору.');
        state.view = nav.dataset.view;
        render();
      }
      if (event.target.closest('#newOrderBtn')) orderModal();
      if (event.target.closest('#newInventoryBtn')) inventoryModal();
      if (event.target.closest('#newFinanceBtn')) financeModal();
      if (event.target.closest('#newMasterBtn')) masterModal();
      const editOrder = event.target.closest('[data-edit-order]');
      if (editOrder) orderModal(state.orders.find(item => item.id === editOrder.dataset.editOrder));
      const deleteOrderBtn = event.target.closest('[data-delete-order]');
      if (deleteOrderBtn && confirm('Удалить заказ у всех устройств?')) await deleteOrder(deleteOrderBtn.dataset.deleteOrder);
      const printBtn = event.target.closest('[data-print-order]');
      if (printBtn) {
        const order = state.orders.find(item => item.id === printBtn.dataset.printOrder);
        if (order) printOrder(order);
      }
      const editInventory = event.target.closest('[data-edit-inventory]');
      if (editInventory) inventoryModal(state.inventory.find(item => item.id === editInventory.dataset.editInventory));
      const deleteInventoryBtn = event.target.closest('[data-delete-inventory]');
      if (deleteInventoryBtn && confirm('Удалить позицию склада?')) await deleteInventoryItem(deleteInventoryBtn.dataset.deleteInventory);
      const editFinance = event.target.closest('[data-edit-finance]');
      if (editFinance) financeModal(state.finance.find(item => item.id === editFinance.dataset.editFinance));
      const deleteFinanceBtn = event.target.closest('[data-delete-finance]');
      if (deleteFinanceBtn && confirm('Удалить финансовую операцию?')) await deleteFinanceItem(deleteFinanceBtn.dataset.deleteFinance);
      const editMaster = event.target.closest('[data-edit-master]');
      if (editMaster) masterModal(state.masters.find(item => item.id === editMaster.dataset.editMaster));
      const deleteMasterBtn = event.target.closest('[data-delete-master]');
      if (deleteMasterBtn && confirm('Удалить мастера и закрыть ему доступ?')) await deleteMaster(deleteMasterBtn.dataset.deleteMaster);
      if (event.target.closest('#resetFiltersBtn')) {
        state.filters = { search:'', status:'', master:'', payment:'' };
        renderOrders();
      }
    });

    document.addEventListener('change', async event => {
      const status = event.target.closest('[data-status-order]');
      if (status) {
        const order = state.orders.find(item => item.id === status.dataset.statusOrder);
        if (order) await saveOrder({ ...order, status:status.value });
      }
      if (event.target.id === 'statusFilter') { state.filters.status = event.target.value; renderOrders(); }
      if (event.target.id === 'masterFilter') { state.filters.master = event.target.value; renderOrders(); }
      if (event.target.id === 'paymentFilter') { state.filters.payment = event.target.value; renderOrders(); }
    });
    document.addEventListener('input', event => {
      if (event.target.id === 'orderSearch') {
        state.filters.search = event.target.value;
        renderOrders();
      }
    });
    document.addEventListener('submit', async event => {
      event.preventDefault();
      const form = event.target;
      const data = Object.fromEntries(new FormData(form).entries());
      if (form.id === 'loginForm') {
        $('loginError').textContent = '';
        const login = data.login || $('loginInput').value.trim();
        const password = data.password || $('passwordInput').value;
        let user = null;
        if (login.toLowerCase() === ADMIN.login.toLowerCase() && password === ADMIN.password) user = { ...ADMIN, password:'' };
        else {
          const master = state.masters.find(item => item.login?.toLowerCase() === login.toLowerCase() && item.password === password && item.active !== false);
          if (master) user = { ...master, password:'' };
        }
        if (!user) {
          $('loginError').textContent = state.firebaseReady ? 'Неверный логин или пароль' : 'Firebase еще подключается';
          return;
        }
        state.user = user;
        saveSession($('rememberInput').checked);
        showApp();
      }
      if (form.id === 'orderForm') {
        await saveOrder(data);
        closeModal();
      }
      if (form.id === 'inventoryForm') {
        await saveInventoryItem(data);
        closeModal();
      }
      if (form.id === 'financeForm') {
        await saveFinanceItem(data);
        closeModal();
      }
      if (form.id === 'masterForm') {
        const roles = [...form.querySelectorAll('input[name="roles"]:checked')].map(item => item.value);
        await saveMaster({ ...data, roles:roles.length ? roles : ['orders'] });
        closeModal();
      }
      if (form.id === 'settingsForm') {
        await saveSettings({
          ...data,
          nextOrderNumber:Number(data.nextOrderNumber || 1000)
        });
      }
    });

    $('logoutBtn').addEventListener('click', showAuth);
    $('themeToggleBtn').addEventListener('click', () => {
      const next = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
      setTheme(next);
      if (isAdmin()) saveSettings({ theme:next }).catch(() => {});
    });

    window.crmState = state;
    window.crmForceRender = render;
    window.crmFirebaseRefs = refs;
    window.crmRealtimeStatus = () => ({
      firebaseReady:state.firebaseReady,
      dataReady:state.dataReady,
      workspace:WORKSPACE_ID,
      orders:state.orders.length,
      masters:state.masters.length,
      inventory:state.inventory.length,
      finance:state.finance.length
    });

    setTheme(localStorage.getItem(THEME_KEY) || 'light');
    $('rememberInput').checked = localStorage.getItem(REMEMBER_KEY) === '1';
    startFirebase();
  </script>
</body>
</html>
